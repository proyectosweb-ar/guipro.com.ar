<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <title>GuiPro.com.ar</title>

    <link rel="stylesheet" type="text/css" href="assets/css/bootstrap.min.css" >
    <link rel="stylesheet" type="text/css" href="assets/fonts/line-icons.css">
    <link rel="stylesheet" type="text/css" href="assets/css/slicknav.css">
    <link rel="stylesheet" type="text/css" href="assets/css/menu_sideslide.css">
    <link rel="stylesheet" type="text/css" href="assets/css/vegas.min.css">
    <link rel="stylesheet" type="text/css" href="assets/css/animate.css">
    <link rel="stylesheet" type="text/css" href="assets/css/main.css">
    <link rel="stylesheet" type="text/css" href="assets/css/responsive.css">
	
<link href="https://fonts.googleapis.com/css2?family=Lato&display=swap" rel="stylesheet">

<style>
  body {
    font-family: 'Lato', sans-serif;
  }

  .heading-count h2 {
    color: #eb6909;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .empresa {
    font-size: 1.2em;
  }

  .grupo {
    font-weight: bold;
  }

  .button-group .btn {
    font-size: 16px;
    padding: 12px 28px;
    margin: 5px;
    border-radius: 30px;
    transition: all 0.3s ease;
    letter-spacing: 0.5px;
    background-color: rgba(255, 255, 255, 0.85);
    color: #eb6909;
    backdrop-filter: blur(2px);
    border: 2px solid #eb6909;
  }

  .btn-common:hover,
  .btn-border:hover {
    background-color: #eb6909;
    color: #fff;
  }

  .social a {
    display: inline-block;
    margin: 0 8px;
    font-size: 20px;
    width: 40px;
    height: 40px;
    line-height: 40px;
    border-radius: 70%;
    background-color: #f1f1f1;
    color: #eb6909;
    transition: all 0.3s ease;
    text-align: center;
  }

  .social a:hover {
    background-color: #eb6909;
    color: #fff;
  }
</style>
  </head>
  <body>

    <div class="bg-wraper overlay has-vignette">
      <div id="example" class="slider opacity-50 vegas-container" style="height: 983px;"></div>
    </div>

<section class="countdown-timer">
  <div class="container">
    <div class="row text-center">
		<div class="col-md-12 col-sm-12 col-xs-12">
			<div class="heading-count" style="text-align: center;">
        
			<div class="logo-coming-soon" style="margin-bottom: 20px;">
				<img src="assets/img/logo.png" alt="GuiaPro Logo">
			</div>

			<h2>GuiPro</h2>
			<br></br><br></br>
			</div>
	</div>	
      <div class="col-md-12 col-sm-12 col-xs-12">
        <p class="empresa">
          <span class="grupo"></span><span class=""</span><br><br>
          <span style="font-size: 1em;">
                  Si necesita contactarse con nosotros pulse el botón más abajo.<br></br>
          </span>
        </p>
          <a href="https://multimark.com.ar/#contactus" target="_blank" class="btn btn-common">Contacto</a>
        </div>
      </div>
    </div>
  </div>
</section>

<p>By Imagery.com.ar<a style="
    color: #fff;
    text-decoration: underline;
" rel="nofollow" href="https://multimark.com.ar"></a></p>
    </section>

    <div id="preloader">
      <div class="loader" id="loader-1"></div>
    </div>

    <script src="assets/js/jquery-min.js"></script>
    <script src="assets/js/popper.min.js"></script>
    <script src="assets/js/bootstrap.min.js"></script>
    <script src="assets/js/vegas.min.js"></script>
    <script src="assets/js/jquery.countdown.min.js"></script>
    <script src="assets/js/classie.js"></script>
    <script src="assets/js/jquery.nav.js"></script>
    <script src="assets/js/jquery.easing.min.js"></script> 
    <script src="assets/js/main.js"></script>


    <script type="text/javascript">
      $("#example").vegas({
          timer: false,
          delay: 6000,
          transitionDuration: 2000,
          transition: "blur",
          slides: [
              { src: "assets/img/slide-1.jpg" },
              { src: "assets/img/slide-2.jpg" },
              { src: "assets/img/slide-3.jpg" },
			  { src: "assets/img/slide-4.jpg" }
          ]
      });
    </script>
	
	<script>
  setTimeout(function () {
    window.location.href = "https://multimark.com.ar/";
  }, 60000); // 60000 ms = 60 segundos
</script>
	
      
  </body>
</html>
